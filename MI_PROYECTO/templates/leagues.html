<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JHONNY_ELITE V15_PRO · Ligas</title>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    :root{
      --bg:#07111c;
      --panel:#0c1b2d;
      --panel-2:#10243a;
      --line:rgba(255,255,255,0.08);
      --text:#eef6ff;
      --muted:#9fc5ef;
      --blue:#2477ff;
      --blue-2:#1858c2;
      --green:#66f0a7;
      --shadow:0 18px 45px rgba(0,0,0,.28);
      --radius:20px;
    }

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:
        radial-gradient(circle at top right, rgba(39,162,255,.10), transparent 18%),
        radial-gradient(circle at left center, rgba(102,240,167,.08), transparent 18%),
        linear-gradient(180deg, #07111c, #081523 40%, #09131c 100%);
      color:var(--text);
      min-height:100vh;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .wrap{
      max-width:1400px;
      margin:0 auto;
      padding:22px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:20px;
      padding:20px 22px;
      border-radius:22px;
      background:linear-gradient(160deg, rgba(16,36,58,.96), rgba(9,20,34,.97));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .brand{
      font-size:32px;
      font-weight:900;
      line-height:1;
    }

    .brand .g{
      color:var(--green);
    }

    .sub{
      font-size:12px;
      color:var(--muted);
      margin-top:8px;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .nav a{
      color:#fff;
      background:linear-gradient(180deg, rgba(18,44,77,.98), rgba(11,28,51,.98));
      border:1px solid rgba(255,255,255,.08);
      padding:11px 16px;
      border-radius:12px;
      font-weight:800;
      transition:transform .15s ease, filter .15s ease;
    }

    .nav a:hover,
    .btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.06);
    }

    .filters{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:12px;
      margin-bottom:20px;
      padding:18px;
      border-radius:20px;
      background:linear-gradient(160deg, rgba(16,36,58,.92), rgba(9,20,34,.94));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .filters select,
    .filters input{
      width:100%;
      background:#11243d;
      color:#eef6ff;
      border:1px solid rgba(255,255,255,.08);
      padding:13px 14px;
      border-radius:12px;
      outline:none;
      font-size:14px;
    }

    .filters input::placeholder{
      color:#9fc5ef;
    }

    .filters select option{
      color:#000;
    }

    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin:6px 0 16px;
    }

    .section-title{
      font-size:24px;
      font-weight:900;
    }

    .section-sub{
      color:var(--muted);
      font-size:13px;
    }

    .league-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
      gap:16px;
    }

    .league-card{
      background:linear-gradient(160deg, rgba(16,31,53,.88), rgba(10,21,36,.92));
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
      transition:transform .15s ease, border-color .15s ease;
    }

    .league-card:hover{
      transform:translateY(-2px);
      border-color:rgba(79,195,255,.28);
    }

    .league-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:14px;
    }

    .league-name{
      font-size:21px;
      font-weight:900;
      line-height:1.2;
    }

    .league-country{
      margin-top:8px;
      color:var(--muted);
      font-size:13px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:38px;
      height:38px;
      padding:0 12px;
      border-radius:999px;
      background:rgba(39,162,255,.16);
      border:1px solid rgba(255,255,255,.08);
      color:#bfe2ff;
      font-weight:900;
      font-size:14px;
    }

    .league-stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
      margin-bottom:16px;
    }

    .stat-box{
      background:rgba(255,255,255,.035);
      border:1px solid rgba(255,255,255,.05);
      border-radius:14px;
      padding:12px;
    }

    .stat-label{
      color:var(--muted);
      font-size:11px;
      text-transform:uppercase;
      margin-bottom:6px;
    }

    .stat-value{
      font-size:24px;
      font-weight:900;
    }

    .league-actions{
      margin-top:4px;
    }

    .btn{
      display:inline-block;
      text-decoration:none;
      color:#fff;
      background:linear-gradient(180deg, var(--blue), var(--blue-2));
      padding:11px 16px;
      border-radius:12px;
      font-weight:900;
      border:none;
      cursor:pointer;
      transition:transform .15s ease, filter .15s ease;
    }

    .empty{
      padding:34px 20px;
      text-align:center;
      border-radius:20px;
      background:linear-gradient(160deg, rgba(16,31,53,.82), rgba(10,21,36,.86));
      border:1px solid rgba(255,255,255,.08);
      color:#aac8ea;
      box-shadow:var(--shadow);
    }

    @media (max-width:860px){
      .topbar{
        flex-direction:column;
        align-items:flex-start;
      }

      .filters{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:640px){
      .wrap{
        padding:14px;
      }

      .brand{
        font-size:26px;
      }

      .section-head{
        flex-direction:column;
        align-items:flex-start;
      }

      .league-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="brand">JHONNY_<span class="g">ELITE</span> V15_PRO</div>
        <div class="sub">Explorador de ligas · Vista de torneos · Acceso rápido a partidos</div>
      </div>

      <div class="nav">
        <a href="/dashboard">Dashboard</a>
      </div>
    </div>

    <div class="filters">
      <select id="dateFilter">
        <option value="today">Hoy</option>
        <option value="tomorrow">Mañana</option>
        <option value="upcoming">Próximos</option>
      </select>

      <select id="stateFilter">
        <option value="live">En vivo</option>
        <option value="finished">Finalizado</option>
        <option value="upcoming">Próximo</option>
      </select>

      <input id="searchInput" type="text" placeholder="Buscar liga o país...">
    </div>

    <div class="section-head">
      <div class="section-title">Vista de ligas</div>
      <div class="section-sub" id="leagueCountText">Cargando ligas...</div>
    </div>

    <div id="leagueGrid" class="league-grid">
      <div class="empty">Cargando ligas...</div>
    </div>
  </div>

  <script>
    function countryToFlag(country){
      const map = {
        "Argentina":"🇦🇷",
        "Brazil":"🇧🇷",
        "Mexico":"🇲🇽",
        "England":"🏴",
        "Spain":"🇪🇸",
        "Italy":"🇮🇹",
        "Germany":"🇩🇪",
        "France":"🇫🇷",
        "Portugal":"🇵🇹",
        "Turkey":"🇹🇷",
        "World":"🌐",
        "Iraq":"🇮🇶",
        "Iran":"🇮🇷",
        "Saudi-Arabia":"🇸🇦",
        "Qatar":"🇶🇦",
        "UAE":"🇦🇪",
        "Belgium":"🇧🇪",
        "Andorra":"🇦🇩",
        "Colombia":"🇨🇴",
        "Chile":"🇨🇱",
        "Peru":"🇵🇪",
        "Panama":"🇵🇦",
        "Jamaica":"🇯🇲",
        "Venezuela":"🇻🇪",
        "Suriname":"🇸🇷",
        "Guatemala":"🇬🇹"
      };
      return map[country] || "🌍";
    }

    let allLeagues = [];

    async function loadLeagues(){
      const grid = document.getElementById("leagueGrid");
      const countText = document.getElementById("leagueCountText");

      try{
        const date = document.getElementById("dateFilter").value;
        const state = document.getElementById("stateFilter").value;

        grid.innerHTML = `<div class="empty">Cargando ligas...</div>`;
        countText.textContent = "Cargando ligas...";

        const res = await fetch(`/api/leagues?date=${encodeURIComponent(date)}&state=${encodeURIComponent(state)}`);
        const data = await res.json();

        allLeagues = Array.isArray(data) ? data : [];
        renderLeagues();
      }catch(err){
        grid.innerHTML = `<div class="empty">Error cargando ligas.</div>`;
        countText.textContent = "No se pudieron cargar las ligas";
      }
    }

    function renderLeagues(){
      const grid = document.getElementById("leagueGrid");
      const countText = document.getElementById("leagueCountText");
      const q = document.getElementById("searchInput").value.toLowerCase().trim();

      const filtered = allLeagues.filter(l => {
        const league = String(l.league || "").toLowerCase();
        const country = String(l.country || "").toLowerCase();
        return !q || league.includes(q) || country.includes(q);
      });

      countText.textContent = `${filtered.length} ligas encontradas`;

      if(!filtered.length){
        grid.innerHTML = `<div class="empty">No hay ligas disponibles con ese filtro.</div>`;
        return;
      }

      grid.innerHTML = filtered.map(l => `
        <div class="league-card">
          <div class="league-top">
            <div>
              <div class="league-name">${l.league || "Liga desconocida"}</div>
              <div class="league-country">${countryToFlag(l.country)} ${l.country || "World"}</div>
            </div>
            <div class="pill">${l.matches_live ?? 0}</div>
          </div>

          <div class="league-stats">
            <div class="stat-box">
              <div class="stat-label">En vivo</div>
              <div class="stat-value">${l.matches_live ?? 0}</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">Total</div>
              <div class="stat-value">${l.matches_total ?? 0}</div>
            </div>
          </div>

          <div class="league-actions">
            <a class="btn" href="/matches/${encodeURIComponent(l.league)}">Seleccionar liga</a>
          </div>
        </div>
      `).join("");
    }

    document.getElementById("dateFilter").addEventListener("change", loadLeagues);
    document.getElementById("stateFilter").addEventListener("change", loadLeagues);
    document.getElementById("searchInput").addEventListener("input", renderLeagues);

    loadLeagues();
  </script>
</body>
        </html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JHONNY_ELITE - Ligas</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:
        linear-gradient(rgba(5,10,18,.86), rgba(5,10,18,.92)),
        url("https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&w=1600&q=80") center/cover fixed no-repeat;
      color:#eef6ff;
      min-height:100vh;
    }
    .wrap{max-width:1200px;margin:0 auto;padding:20px}
    .topbar{
      display:flex;justify-content:space-between;align-items:center;gap:12px;
      margin-bottom:20px;padding:18px 20px;border-radius:18px;
      background:rgba(11,22,40,.82);border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(10px);
    }
    .brand{font-size:28px;font-weight:900}
    .brand .g{color:#66f0a7}
    .sub{font-size:12px;color:#9fc5ef;margin-top:6px}
    .nav a{
      text-decoration:none;color:#fff;background:#183150;border:1px solid rgba(255,255,255,.08);
      padding:10px 14px;border-radius:12px;font-weight:700
    }
    .filters{
      display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;
      padding:16px;border-radius:18px;background:rgba(11,22,40,.78);
      border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(10px);
    }
    .filters select,.filters input{
      background:#11243d;color:#eef6ff;border:1px solid rgba(255,255,255,.08);
      padding:12px 14px;border-radius:12px;min-width:180px;outline:none;
    }
    .section-title{font-size:22px;font-weight:900;margin:14px 0 16px}
    .league-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;
    }
    .league-card{
      background:rgba(16,31,53,.82);border:1px solid rgba(255,255,255,.08);
      border-radius:18px;padding:16px;backdrop-filter:blur(10px);
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }
    .league-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .league-name{font-size:20px;font-weight:900;line-height:1.2}
    .league-country{margin-top:8px;color:#9fc5ef;font-size:13px}
    .pill{
      display:inline-flex;align-items:center;justify-content:center;
      min-width:30px;height:30px;padding:0 10px;border-radius:999px;
      background:#21466f;border:1px solid rgba(255,255,255,.08);font-weight:900
    }
    .league-stats{margin-top:14px;color:#d7e9ff;font-size:13px;line-height:1.6}
    .league-actions{margin-top:16px}
    .btn{
      display:inline-block;text-decoration:none;color:#fff;background:linear-gradient(180deg,#2477ff,#1858c2);
      padding:11px 16px;border-radius:12px;font-weight:900;border:none;cursor:pointer
    }
    .empty{
      padding:30px;text-align:center;border-radius:18px;background:rgba(16,31,53,.72);
      border:1px solid rgba(255,255,255,.08);color:#aac8ea
    }
    @media (max-width:700px){
      .topbar{flex-direction:column;align-items:flex-start}
      .filters select,.filters input{width:100%}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="brand">JHONNY_<span class="g">ELITE</span></div>
        <div class="sub">Nivel 1 · Vista de ligas y torneos</div>
      </div>
      <div class="nav">
        <a href="/dashboard">Dashboard</a>
      </div>
    </div>

    <div class="filters">
      <select id="dateFilter">
        <option value="today">Hoy</option>
        <option value="tomorrow">Mañana</option>
        <option value="upcoming">Próximos</option>
      </select>

      <select id="stateFilter">
        <option value="live">En vivo</option>
        <option value="finished">Finalizado</option>
        <option value="upcoming">Próximo</option>
      </select>

      <input id="searchInput" type="text" placeholder="Buscar liga o país...">
    </div>

    <div class="section-title">Vista de Ligas</div>

    <div id="leagueGrid" class="league-grid">
      <div class="empty">Cargando ligas...</div>
    </div>
  </div>

  <script>
    function countryToFlag(country){
      const map = {
        "Argentina":"🇦🇷","Brazil":"🇧🇷","Mexico":"🇲🇽","England":"🏴","Spain":"🇪🇸","Italy":"🇮🇹",
        "Germany":"🇩🇪","France":"🇫🇷","Portugal":"🇵🇹","Turkey":"🇹🇷","World":"🌐","Iraq":"🇮🇶",
        "Iran":"🇮🇷","Saudi-Arabia":"🇸🇦","Qatar":"🇶🇦","UAE":"🇦🇪","Belgium":"🇧🇪","Andorra":"🇦🇩"
      };
      return map[country] || "🌍";
    }

    let allLeagues = [];

    async function loadLeagues(){
      const grid = document.getElementById("leagueGrid");
      try{
        const date = document.getElementById("dateFilter").value;
        const state = document.getElementById("stateFilter").value;
        const res = await fetch(`/api/leagues?date=${encodeURIComponent(date)}&state=${encodeURIComponent(state)}`);
        const data = await res.json();
        allLeagues = Array.isArray(data) ? data : [];
        renderLeagues();
      }catch(err){
        grid.innerHTML = `<div class="empty">Error cargando ligas</div>`;
      }
    }

    function renderLeagues(){
      const grid = document.getElementById("leagueGrid");
      const q = document.getElementById("searchInput").value.toLowerCase().trim();

      const filtered = allLeagues.filter(l => {
        const league = String(l.league || "").toLowerCase();
        const country = String(l.country || "").toLowerCase();
        return !q || league.includes(q) || country.includes(q);
      });

      if(!filtered.length){
        grid.innerHTML = `<div class="empty">No hay ligas disponibles con ese filtro.</div>`;
        return;
      }

      grid.innerHTML = filtered.map(l => `
        <div class="league-card">
          <div class="league-top">
            <div>
              <div class="league-name">${l.league}</div>
              <div class="league-country">${countryToFlag(l.country)} ${l.country}</div>
            </div>
            <div class="pill">${l.matches_live ?? 0}</div>
          </div>

          <div class="league-stats">
            Partidos en vivo: <strong>${l.matches_live ?? 0}</strong><br>
            Total partidos: <strong>${l.matches_total ?? 0}</strong>
          </div>

          <div class="league-actions">
            <a class="btn" href="/matches/${encodeURIComponent(l.league)}">Seleccionar liga</a>
          </div>
        </div>
      `).join("");
    }

    document.getElementById("dateFilter").addEventListener("change", loadLeagues);
    document.getElementById("stateFilter").addEventListener("change", loadLeagues);
    document.getElementById("searchInput").addEventListener("input", renderLeagues);

    loadLeagues();
  </script>
</body>
  </html>
